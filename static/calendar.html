<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Premium Apart</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
/>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {

    --bg: #f7f7f7;
    --card: #ffffff;

    --text: #222222;
    --muted: #717171;

    --border: #ebebeb;

    --primary: #111111;

    --range: #f2f2f2;

    --shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 8px 24px rgba(0,0,0,0.06);

    --radius: 28px;

}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html {
    scroll-behavior: smooth;
}

body {

    margin: 0;
    padding: 0;

    background: var(--bg);

    color: var(--text);

    font-family: 'Inter', sans-serif;

    min-height: 100vh;

}

.wrapper {

    width: 100%;
    max-width: 760px;

    margin: auto;

    padding:
        calc(env(safe-area-inset-top) + 18px)
        16px
        160px;

}

/* ===================================================== */
/* HERO */
/* ===================================================== */

.hero {

    margin-bottom: 20px;

}

.badge {

    display: inline-flex;

    align-items: center;

    gap: 6px;

    padding: 8px 14px;

    background: white;

    border: 1px solid var(--border);

    border-radius: 999px;

    font-size: 13px;

    font-weight: 600;

    margin-bottom: 16px;

}

.title {

    font-size: 36px;

    font-weight: 800;

    letter-spacing: -1.8px;

    line-height: 1.05;

    margin-bottom: 10px;

}

.subtitle {

    font-size: 15px;

    color: var(--muted);

    line-height: 1.6;

}

/* ===================================================== */
/* CARD */
/* ===================================================== */

.card {

    background: var(--card);

    border-radius: var(--radius);

    border: 1px solid var(--border);

    box-shadow: var(--shadow);

    overflow: hidden;

}

/* ===================================================== */
/* CALENDAR */
/* ===================================================== */

.calendar-section {

    padding: 24px;

}

.calendar-header {

    display: flex;

    justify-content: space-between;

    align-items: center;

    margin-bottom: 18px;

}

.calendar-title {

    font-size: 22px;

    font-weight: 700;

    letter-spacing: -0.6px;

}

.calendar-sub {

    font-size: 14px;

    color: var(--muted);

}

.input {
    display: none;
}

/* ===================================================== */
/* INFO GRID */
/* ===================================================== */

.info-grid {

    display: grid;

    grid-template-columns: repeat(3, 1fr);

    border-top: 1px solid var(--border);

}

.info-item {

    padding: 20px;

}

.info-item:not(:last-child) {

    border-right: 1px solid var(--border);

}

.info-label {

    font-size: 12px;

    color: var(--muted);

    text-transform: uppercase;

    font-weight: 700;

    margin-bottom: 8px;

    letter-spacing: 0.5px;

}

.info-value {

    font-size: 15px;

    font-weight: 700;

}

/* ===================================================== */
/* FLATPICKR */
/* ===================================================== */

.flatpickr-calendar {

    width: 100% !important;

    border: none !important;

    box-shadow: none !important;

    background: transparent !important;

}

.flatpickr-months {

    margin-bottom: 18px;

}

.flatpickr-month {

    height: 42px !important;

}

.flatpickr-current-month {

    font-size: 20px !important;

    font-weight: 700 !important;

    padding-top: 0 !important;

}

.flatpickr-current-month .flatpickr-monthDropdown-months {

    font-weight: 700 !important;

}

.flatpickr-weekdays {

    margin-bottom: 10px;

}

.flatpickr-weekday {

    color: #8e8e93 !important;

    font-size: 12px !important;

    font-weight: 700 !important;

    text-transform: uppercase;

}

.flatpickr-days {

    width: 100% !important;

}

.dayContainer {

    width: 100% !important;

    min-width: 100% !important;

    max-width: 100% !important;

}

.flatpickr-day {

    border: none !important;

    border-radius: 50% !important;

    height: 48px !important;

    line-height: 48px !important;

    max-width: 48px !important;

    font-size: 14px;

    font-weight: 600;

    color: var(--text);

    transition:
        background 0.18s ease,
        transform 0.12s ease,
        color 0.18s ease;

}

.flatpickr-day:hover {

    background: #f2f2f2 !important;

    transform: scale(1.04);

}

.flatpickr-day.today {

    border: 1.5px solid #111 !important;

    background: white !important;

}

.flatpickr-day.selected,
.flatpickr-day.startRange,
.flatpickr-day.endRange {

    background: #111 !important;

    color: white !important;

}

.flatpickr-day.inRange {

    background: var(--range) !important;

    color: #111 !important;

    border-radius: 0 !important;

}

.flatpickr-day.startRange {

    border-top-left-radius: 999px !important;
    border-bottom-left-radius: 999px !important;

}

.flatpickr-day.endRange {

    border-top-right-radius: 999px !important;
    border-bottom-right-radius: 999px !important;

}

.flatpickr-day.flatpickr-disabled {

    color: #d93025 !important;

    background: #fff5f5 !important;

    opacity: 0.65;

    text-decoration: line-through;

}

.flatpickr-day.prevMonthDay,
.flatpickr-day.nextMonthDay {

    opacity: 0.15;

}

.flatpickr-prev-month,
.flatpickr-next-month {

    top: 6px !important;

}

.flatpickr-prev-month:hover,
.flatpickr-next-month:hover {

    background: #f5f5f5;

    border-radius: 12px;

}

.flatpickr-prev-month svg,
.flatpickr-next-month svg {

    width: 16px !important;
    height: 16px !important;

}

/* ===================================================== */
/* STICKY FOOTER */
/* ===================================================== */

.footer {

    position: fixed;

    left: 0;
    right: 0;
    bottom: 0;

    z-index: 999;

    background: rgba(255,255,255,0.92);

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border-top: 1px solid rgba(0,0,0,0.06);

    padding:
        14px
        16px
        calc(env(safe-area-inset-bottom) + 18px);

}

.footer-inner {

    max-width: 760px;

    margin: auto;

    display: flex;

    justify-content: space-between;

    align-items: center;

    gap: 14px;

}

.price-box {

    display: flex;

    flex-direction: column;

}

.price {

    font-size: 22px;

    font-weight: 800;

    letter-spacing: -0.8px;

}

.price-sub {

    font-size: 13px;

    color: var(--muted);

    margin-top: 3px;

}

.book-btn {

    border: none;

    background: #111;

    color: white;

    height: 56px;

    padding: 0 28px;

    border-radius: 18px;

    font-size: 15px;

    font-weight: 700;

    cursor: pointer;

    transition:
        transform 0.14s ease,
        opacity 0.14s ease;

    box-shadow:
        0 10px 25px rgba(0,0,0,0.12);

}

.book-btn:hover {

    transform: translateY(-1px);

}

.book-btn:active {

    transform: scale(0.98);

}

.book-btn:disabled {

    opacity: 0.4;

    cursor: not-allowed;

    transform: none;

    box-shadow: none;

}

/* ===================================================== */
/* MOBILE */
/* ===================================================== */

@media (max-width: 640px) {

    .wrapper {

        padding:
            calc(env(safe-area-inset-top) + 14px)
            12px
            150px;

    }

    .title {

        font-size: 30px;

    }

    .calendar-section {

        padding: 20px 16px;

    }

    .info-grid {

        grid-template-columns: 1fr;

    }

    .info-item:not(:last-child) {

        border-right: none;

        border-bottom: 1px solid var(--border);

    }

    .flatpickr-day {

        height: 44px !important;

        line-height: 44px !important;

        max-width: 44px !important;

    }

    .footer-inner {

        align-items: stretch;

    }

    .book-btn {

        min-width: 150px;

    }

}

</style>
</head>

<body>

<div class="wrapper">

<div class="hero">

<div class="badge">
⭐ Городская Пауза
</div>

<div class="title">
Premium Apart
</div>

<div class="subtitle">
Выберите даты проживания и подтвердите бронирование
</div>

</div>

<div class="card">

<div class="calendar-section">

<div class="calendar-header">

<div>
<div class="calendar-title">
Выбор дат
</div>

<div class="calendar-sub">
Красные даты недоступны
</div>
</div>

</div>

<input
type="text"
id="calendar"
class="input"
/>

</div>

<div class="info-grid">

<div class="info-item">

<div class="info-label">
Заезд
</div>

<div class="info-value" id="checkin-value">
—
</div>

</div>

<div class="info-item">

<div class="info-label">
Выезд
</div>

<div class="info-value" id="checkout-value">
—
</div>

</div>

<div class="info-item">

<div class="info-label">
Ночей
</div>

<div class="info-value" id="nights-value">
0
</div>

</div>

</div>

</div>

</div>

<!-- ===================================================== -->
<!-- STICKY FOOTER -->
<!-- ===================================================== -->

<div class="footer">

<div class="footer-inner">

<div class="price-box">

<div class="price" id="total-price">
€0
</div>

<div class="price-sub">
Общая стоимость
</div>

</div>

<button
class="book-btn"
id="book-btn"
disabled
onclick="sendBooking()"
>
Забронировать
</button>

</div>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

let bookedDates = [];

let selectedCheckIn = null;
let selectedCheckOut = null;

const PRICE_PER_NIGHT = 120;


// =====================================================
// LOAD BOOKINGS
// =====================================================

async function loadBookedDates() {

    try {

        const response = await fetch("/api/booked-dates");

        const ranges = await response.json();

        bookedDates = expandBookedRanges(ranges);

        initCalendar();

    } catch (e) {

        console.error(e);

    }

}


// =====================================================
// EXPAND RANGES
// =====================================================

function expandBookedRanges(ranges) {

    const disabled = [];

    ranges.forEach(range => {

        const start = new Date(range.check_in);

        const end = new Date(range.check_out);

        const current = new Date(start);

        while (current < end) {

            disabled.push(
                formatDate(current)
            );

            current.setDate(
                current.getDate() + 1
            );

        }

    });

    return disabled;

}


// =====================================================
// FORMAT DATE
// =====================================================

function formatDate(date) {

    const y = date.getFullYear();

    const m = String(
        date.getMonth() + 1
    ).padStart(2, "0");

    const d = String(
        date.getDate()
    ).padStart(2, "0");

    return `${y}-${m}-${d}`;

}


// =====================================================
// CALCULATE NIGHTS
// =====================================================

function calculateNights(start, end) {

    const s = new Date(start);

    const e = new Date(end);

    return Math.ceil(
        (e - s) / (1000 * 60 * 60 * 24)
    );

}


// =====================================================
// UPDATE INFO
// =====================================================

function updateInfo() {

    document.getElementById(
        "checkin-value"
    ).innerText =
        selectedCheckIn || "—";

    document.getElementById(
        "checkout-value"
    ).innerText =
        selectedCheckOut || "—";

    const nightsElement =
        document.getElementById(
            "nights-value"
        );

    const totalElement =
        document.getElementById(
            "total-price"
        );

    const button =
        document.getElementById(
            "book-btn"
        );

    if (
        selectedCheckIn &&
        selectedCheckOut
    ) {

        const nights =
            calculateNights(
                selectedCheckIn,
                selectedCheckOut
            );

        nightsElement.innerText =
            nights;

        const total =
            nights * PRICE_PER_NIGHT;

        totalElement.innerText =
            `€${total}`;

        button.disabled = false;

    } else {

        nightsElement.innerText = "0";

        totalElement.innerText = "€0";

        button.disabled = true;

    }

}


// =====================================================
// INIT CALENDAR
// =====================================================

function initCalendar() {

    flatpickr("#calendar", {

        mode: "range",

        minDate: "today",

        dateFormat: "Y-m-d",

        locale: "ru",

        inline: true,

        showMonths: 2,

        disable: bookedDates,

        onChange: function(selectedDates) {

            if (
                selectedDates.length === 2
            ) {

                selectedCheckIn =
                    formatDate(
                        selectedDates[0]
                    );

                selectedCheckOut =
                    formatDate(
                        selectedDates[1]
                    );

            } else {

                selectedCheckIn = null;

                selectedCheckOut = null;

            }

            updateInfo();

        }

    });

}


// =====================================================
// SEND BOOKING
// =====================================================

function sendBooking() {

    if (
        !selectedCheckIn ||
        !selectedCheckOut
    ) {

        alert(
            "Выберите даты"
        );

        return;

    }

    tg.sendData(JSON.stringify({

        check_in: selectedCheckIn,

        check_out: selectedCheckOut,

        guests: 2

    }));

}


// =====================================================
// START
// =====================================================

loadBookedDates();

</script>

</body>
</html>
