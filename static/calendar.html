<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Airbnb Calendar</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    max-width: 420px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-top: 15px;
}

.day {
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    background: #eee;
    font-size: 14px;
}

.day.disabled {
    background: #ddd;
    color: #999;
    pointer-events: none;
}

.day.selected {
    background: black;
    color: white;
}
</style>
</head>

<body>

<div class="card">
    <h2>🏠 Select Dates</h2>

    <div id="calendar" class="grid"></div>

    <button onclick="send()" style="margin-top:15px;width:100%;padding:12px;background:black;color:white;border:none;border-radius:10px;">
        Забронировать
    </button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let booked = [];
let start = null;
let end = null;

fetch("/api/booked-dates")
    .then(r => r.json())
    .then(data => {
        booked = data;
        render();
    });

function isBooked(date) {
    return booked.some(b =>
        date >= b.check_in && date <= b.check_out
    );
}

// ==========================
// BUILD SIMPLE 30 DAYS VIEW
// ==========================
function render() {
    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    const today = new Date();

    for (let i = 0; i < 30; i++) {
        const d = new Date();
        d.setDate(today.getDate() + i);

        const iso = d.toISOString().split("T")[0];

        const div = document.createElement("div");
        div.className = "day";

        if (isBooked(iso)) {
            div.classList.add("disabled");
        }

        if (start && end && iso >= start && iso <= end) {
            div.classList.add("selected");
        }

        div.innerText = d.getDate();

        div.onclick = () => selectDate(iso);

        cal.appendChild(div);
    }
}

function selectDate(date) {

    if (!start || (start && end)) {
        start = date;
        end = null;
    } else {
        if (date < start) {
            alert("Нельзя выбрать раньше");
            return;
        }

        end = date;
    }

    render();
}

function send() {
    if (!start || !end) {
        alert("Выбери диапазон");
        return;
    }

    tg.sendData(JSON.stringify({
        check_in: start,
        check_out: end,
        guests: 2
    }));
}
</script>

</body>
</html>
