<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking Calendar</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f4f4f4;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    background: black;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="card">
    <h2>🏠 Booking</h2>

    <input type="date" id="checkin">
    <input type="date" id="checkout">

    <button onclick="send()">Забронировать</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let booked = [];

fetch("/api/booked-dates")
    .then(r => r.json())
    .then(data => booked = data);

function send() {
    const checkin = document.getElementById("checkin").value;
    const checkout = document.getElementById("checkout").value;

    if (!checkin || !checkout) {
        alert("Выбери даты");
        return;
    }

    if (checkin > checkout) {
        alert("Ошибка дат");
        return;
    }

    tg.sendData(JSON.stringify({
        check_in: checkin,
        check_out: checkout,
        guests: 2
    }));
}
</script>

</body>
</html>
