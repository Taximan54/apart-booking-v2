<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Apart</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
/>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    background: #f3f4f6;
    font-family: Arial, sans-serif;
    color: #111827;
}

.wrapper {
    max-width: 520px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 28px;
    padding: 24px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.08);
}

.title {
    font-size: 30px;
    font-weight: bold;
    margin-bottom: 10px;
}

.subtitle {
    color: #6b7280;
    margin-bottom: 24px;
    font-size: 15px;
}

.calendar-box {
    margin-bottom: 20px;
}

.input {
    width: 100%;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 16px;
    font-size: 16px;
    outline: none;
}

.info {
    margin-top: 18px;
    background: #f9fafb;
    border-radius: 16px;
    padding: 16px;
    line-height: 1.6;
}

.row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
}

.label {
    color: #6b7280;
}

.value {
    font-weight: bold;
}

.button {
    width: 100%;
    border: none;
    background: black;
    color: white;
    padding: 18px;
    border-radius: 18px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.2s;
}

.button:hover {
    opacity: 0.92;
}

.button:disabled {
    background: #9ca3af;
    cursor: not-allowed;
}

.status {
    margin-top: 14px;
    color: #6b7280;
    font-size: 14px;
}

.flatpickr-calendar {
    border-radius: 22px !important;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12) !important;
}

.flatpickr-day.selected {
    background: black !important;
    border-color: black !important;
}

.flatpickr-day.inRange {
    background: #dbeafe !important;
    border-color: #dbeafe !important;
    box-shadow: none !important;
}

.flatpickr-day.flatpickr-disabled {
    background: #ef4444 !important;
    color: white !important;
    opacity: 0.5;
    border-radius: 50%;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="card">

<div class="title">
🏠 Premium Apart
</div>

<div class="subtitle">
Выберите даты проживания
</div>

<div class="calendar-box">

<input
type="text"
id="calendar"
class="input"
placeholder="Выберите даты"
/>

</div>

<div class="info">

<div class="row">
<div class="label">Заезд</div>
<div class="value" id="checkin-value">—</div>
</div>

<div class="row">
<div class="label">Выезд</div>
<div class="value" id="checkout-value">—</div>
</div>

<div class="row">
<div class="label">Ночей</div>
<div class="value" id="nights-value">0</div>
</div>

</div>

<button
class="button"
id="book-btn"
disabled
onclick="sendBooking()"
>
Забронировать
</button>

<div class="status">
🔴 Красные даты заняты
</div>

</div>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

let bookedDates = [];

let selectedCheckIn = null;
let selectedCheckOut = null;


// =====================================================
// LOAD BOOKINGS
// =====================================================

async function loadBookedDates() {

    try {

        const response = await fetch("/api/booked-dates");

        const ranges = await response.json();

        bookedDates = expandBookedRanges(ranges);

        initCalendar();

    } catch (e) {

        console.error(e);

    }

}


// =====================================================
// EXPAND RANGES
// =====================================================

function expandBookedRanges(ranges) {

    const disabled = [];

    ranges.forEach(range => {

        const start = new Date(range.check_in);
        const end = new Date(range.check_out);

        const current = new Date(start);

        while (current < end) {

    disabled.push(formatDate(current));

    current.setDate(current.getDate() + 1);

}

    });

    return disabled;

}


// =====================================================
// FORMAT DATE
// =====================================================

function formatDate(date) {

    const y = date.getFullYear();

    const m = String(date.getMonth() + 1)
        .padStart(2, "0");

    const d = String(date.getDate())
        .padStart(2, "0");

    return `${y}-${m}-${d}`;

}


// =====================================================
// CALCULATE NIGHTS
// =====================================================

function calculateNights(start, end) {

    const s = new Date(start);
    const e = new Date(end);

    const diff = e - s;

    return Math.ceil(
        diff / (1000 * 60 * 60 * 24)
    );

}


// =====================================================
// UPDATE INFO
// =====================================================

function updateInfo() {

    document.getElementById("checkin-value")
        .innerText = selectedCheckIn || "—";

    document.getElementById("checkout-value")
        .innerText = selectedCheckOut || "—";

    if (selectedCheckIn && selectedCheckOut) {

        const nights = calculateNights(
            selectedCheckIn,
            selectedCheckOut
        );

        document.getElementById("nights-value")
            .innerText = nights;

        document.getElementById("book-btn")
            .disabled = false;

    } else {

        document.getElementById("nights-value")
            .innerText = "0";

        document.getElementById("book-btn")
            .disabled = true;

    }

}


// =====================================================
// INIT CALENDAR
// =====================================================

function initCalendar() {

    flatpickr("#calendar", {

        mode: "range",

        minDate: "today",

        dateFormat: "Y-m-d",

        locale: "ru",

        showMonths: 2,

        disable: bookedDates,

        inline: true,

        onChange: function(selectedDates) {

            if (selectedDates.length === 2) {

                selectedCheckIn =
                    formatDate(selectedDates[0]);

                selectedCheckOut =
                    formatDate(selectedDates[1]);

            } else {

                selectedCheckIn = null;
                selectedCheckOut = null;

            }

            updateInfo();

        }

    });

}


// =====================================================
// SEND BOOKING
// =====================================================

function sendBooking() {

    if (!selectedCheckIn || !selectedCheckOut) {

        alert("Выберите даты");

        return;

    }

    tg.sendData(JSON.stringify({

        check_in: selectedCheckIn,
        check_out: selectedCheckOut,
        guests: 2

    }));

}


// =====================================================
// START
// =====================================================

loadBookedDates();

</script>

</body>
</html>
