<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Apart</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
/>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    padding: 0;
    background: #f7f7f7;
    font-family: 'Inter', sans-serif;
    color: #222;
}

.wrapper {
    max-width: 640px;
    margin: auto;
    padding: 20px 16px 40px;
}

.card {
    background: white;
    border-radius: 32px;
    padding: 28px;
    box-shadow:
        0 4px 20px rgba(0,0,0,0.04),
        0 12px 40px rgba(0,0,0,0.06);
}

.title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 8px;
}

.subtitle {
    font-size: 15px;
    color: #717171;
    margin-bottom: 28px;
    line-height: 1.5;
}

.calendar-box {
    margin-bottom: 24px;
}

.input {
    display: none;
}

.info {
    background: #fafafa;
    border: 1px solid #ebebeb;
    border-radius: 24px;
    padding: 20px;
    margin-top: 20px;
}

.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
}

.row:not(:last-child) {
    border-bottom: 1px solid #efefef;
}

.label {
    font-size: 14px;
    color: #717171;
}

.value {
    font-size: 15px;
    font-weight: 600;
    color: #111;
}

.button {
    width: 100%;
    border: none;
    background: #111;
    color: white;
    padding: 18px;
    border-radius: 18px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 24px;
    transition: all 0.2s ease;
}

.button:hover {
    transform: translateY(-1px);
    opacity: 0.96;
}

.button:active {
    transform: scale(0.99);
}

.button:disabled {
    background: #d1d5db;
    cursor: not-allowed;
    transform: none;
}

.status {
    margin-top: 16px;
    text-align: center;
    color: #717171;
    font-size: 13px;
}

/* ===================================================== */
/* FLATPICKR */
/* ===================================================== */

.flatpickr-calendar {
    width: 100% !important;
    border: none !important;
    box-shadow: none !important;
    background: transparent !important;
}

.flatpickr-months {
    margin-bottom: 16px;
}

.flatpickr-month {
    height: 42px !important;
}

.flatpickr-current-month {
    font-size: 18px !important;
    font-weight: 700 !important;
    padding-top: 0 !important;
}

.flatpickr-weekdays {
    margin-bottom: 10px;
}

.flatpickr-weekday {
    color: #717171 !important;
    font-size: 13px !important;
    font-weight: 600 !important;
}

.flatpickr-days {
    width: 100% !important;
}

.dayContainer {
    width: 100% !important;
    min-width: 100% !important;
    max-width: 100% !important;
}

.flatpickr-day {
    border-radius: 16px !important;
    border: none !important;
    height: 52px !important;
    line-height: 52px !important;
    max-width: 52px !important;
    font-size: 15px;
    font-weight: 500;
    color: #222;
    transition: all 0.15s ease;
}

.flatpickr-day:hover {
    background: #f2f2f2 !important;
}

.flatpickr-day.today {
    border: 1.5px solid #111 !important;
    background: white !important;
}

.flatpickr-day.selected,
.flatpickr-day.startRange,
.flatpickr-day.endRange {
    background: #111 !important;
    color: white !important;
}

.flatpickr-day.inRange {
    background: #f1f1f1 !important;
    color: #111 !important;
    border-radius: 0 !important;
}

.flatpickr-day.startRange {
    border-top-left-radius: 16px !important;
    border-bottom-left-radius: 16px !important;
}

.flatpickr-day.endRange {
    border-top-right-radius: 16px !important;
    border-bottom-right-radius: 16px !important;
}

.flatpickr-day.flatpickr-disabled {
    background: #fff0f0 !important;
    color: #d93025 !important;
    opacity: 0.55;
    text-decoration: line-through;
}

.flatpickr-day.prevMonthDay,
.flatpickr-day.nextMonthDay {
    opacity: 0.2;
}

.flatpickr-prev-month,
.flatpickr-next-month {
    top: 8px !important;
}

.flatpickr-prev-month svg,
.flatpickr-next-month svg {
    width: 18px !important;
    height: 18px !important;
}

/* ===================================================== */
/* MOBILE */
/* ===================================================== */

@media (max-width: 640px) {

    .wrapper {
        padding: 0;
    }

    .card {
        min-height: 100vh;
        border-radius: 0;
        padding: 24px 20px 40px;
    }

    .title {
        font-size: 28px;
    }

    .flatpickr-day {
        height: 48px !important;
        line-height: 48px !important;
        max-width: 48px !important;
    }

}

</style>
</head>

<body>

<div class="wrapper">

<div class="card">

<div class="title">
🏠 Premium Apart
</div>

<div class="subtitle">
Выберите даты проживания
</div>

<div class="calendar-box">

<input
type="text"
id="calendar"
class="input"
placeholder="Выберите даты"
/>

</div>

<div class="info">

<div class="row">
<div class="label">Заезд</div>
<div class="value" id="checkin-value">—</div>
</div>

<div class="row">
<div class="label">Выезд</div>
<div class="value" id="checkout-value">—</div>
</div>

<div class="row">
<div class="label">Ночей</div>
<div class="value" id="nights-value">0</div>
</div>

</div>

<button
class="button"
id="book-btn"
disabled
onclick="sendBooking()"
>
Забронировать
</button>

<div class="status">
🔴 Красные даты заняты
</div>

</div>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

let bookedDates = [];

let selectedCheckIn = null;
let selectedCheckOut = null;


// =====================================================
// LOAD BOOKINGS
// =====================================================

async function loadBookedDates() {

    try {

        const response = await fetch("/api/booked-dates");

        const ranges = await response.json();

        bookedDates = expandBookedRanges(ranges);

        initCalendar();

    } catch (e) {

        console.error(e);

    }

}


// =====================================================
// EXPAND RANGES
// =====================================================

function expandBookedRanges(ranges) {

    const disabled = [];

    ranges.forEach(range => {

        const start = new Date(range.check_in);
        const end = new Date(range.check_out);

        const current = new Date(start);

        while (current < end) {

    disabled.push(formatDate(current));

    current.setDate(current.getDate() + 1);

}

    });

    return disabled;

}


// =====================================================
// FORMAT DATE
// =====================================================

function formatDate(date) {

    const y = date.getFullYear();

    const m = String(date.getMonth() + 1)
        .padStart(2, "0");

    const d = String(date.getDate())
        .padStart(2, "0");

    return `${y}-${m}-${d}`;

}


// =====================================================
// CALCULATE NIGHTS
// =====================================================

function calculateNights(start, end) {

    const s = new Date(start);
    const e = new Date(end);

    const diff = e - s;

    return Math.ceil(
        diff / (1000 * 60 * 60 * 24)
    );

}


// =====================================================
// UPDATE INFO
// =====================================================

function updateInfo() {

    document.getElementById("checkin-value")
        .innerText = selectedCheckIn || "—";

    document.getElementById("checkout-value")
        .innerText = selectedCheckOut || "—";

    if (selectedCheckIn && selectedCheckOut) {

        const nights = calculateNights(
            selectedCheckIn,
            selectedCheckOut
        );

        document.getElementById("nights-value")
            .innerText = nights;

        document.getElementById("book-btn")
            .disabled = false;

    } else {

        document.getElementById("nights-value")
            .innerText = "0";

        document.getElementById("book-btn")
            .disabled = true;

    }

}


// =====================================================
// INIT CALENDAR
// =====================================================

function initCalendar() {

    flatpickr("#calendar", {

        mode: "range",

        minDate: "today",

        dateFormat: "Y-m-d",

        locale: "ru",

        showMonths: 2,

        disable: bookedDates,

        inline: true,

        onChange: function(selectedDates) {

            if (selectedDates.length === 2) {

                selectedCheckIn =
                    formatDate(selectedDates[0]);

                selectedCheckOut =
                    formatDate(selectedDates[1]);

            } else {

                selectedCheckIn = null;
                selectedCheckOut = null;

            }

            updateInfo();

        }

    });

}


// =====================================================
// SEND BOOKING
// =====================================================

function sendBooking() {

    if (!selectedCheckIn || !selectedCheckOut) {

        alert("Выберите даты");

        return;

    }

    tg.sendData(JSON.stringify({

        check_in: selectedCheckIn,
        check_out: selectedCheckOut,
        guests: 2

    }));

}


// =====================================================
// START
// =====================================================

loadBookedDates();

</script>

</body>
</html>
