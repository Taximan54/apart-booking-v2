```html
<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Apart</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
/>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {

    --bg: #f4f5f9;

    --card:
        rgba(255,255,255,0.72);

    --text: #111111;

    --muted: #70757a;

    --accent: #111111;

    --glass-border:
        rgba(255,255,255,0.55);

    --shadow:
        0 10px 40px rgba(15,23,42,0.08),
        0 2px 12px rgba(15,23,42,0.05);

}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html {
    scroll-behavior: smooth;
}

body {

    margin: 0;
    padding: 0;

    min-height: 100vh;

    font-family: 'Inter', sans-serif;

    background:
        radial-gradient(
            circle at top left,
            #ffffff,
            #f5f7fb 40%,
            #eef2f7 100%
        );

    color: var(--text);

    overflow-x: hidden;

}

/* ===================================================== */
/* BACKGROUND GLOW */
/* ===================================================== */

body::before {

    content: "";

    position: fixed;

    inset: 0;

    background:

        radial-gradient(
            circle at top right,
            rgba(255,255,255,0.9),
            transparent 30%
        ),

        radial-gradient(
            circle at bottom left,
            rgba(255,255,255,0.45),
            transparent 40%
        );

    pointer-events: none;

}

/* ===================================================== */
/* WRAPPER */
/* ===================================================== */

.wrapper {

    width: 100%;

    max-width: 760px;

    margin: auto;

    padding:
        calc(env(safe-area-inset-top) + 18px)
        18px
        140px;

}

/* ===================================================== */
/* CARD */
/* ===================================================== */

.card {

    position: relative;

    background: var(--card);

    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);

    border:
        1px solid var(--glass-border);

    border-radius: 38px;

    padding: 30px 26px;

    box-shadow: var(--shadow);

    overflow: hidden;

    animation:
        fadeUp 0.7s ease;

}

@keyframes fadeUp {

    from {

        opacity: 0;

        transform:
            translateY(18px);

    }

    to {

        opacity: 1;

        transform:
            translateY(0);

    }

}

/* ===================================================== */
/* LIGHT EFFECT */
/* ===================================================== */

.card::before {

    content: "";

    position: absolute;

    top: -120px;
    right: -120px;

    width: 260px;
    height: 260px;

    background:
        radial-gradient(
            circle,
            rgba(255,255,255,0.9),
            transparent 70%
        );

}

/* ===================================================== */
/* TITLE */
/* ===================================================== */

.title {

    font-size: 40px;

    font-weight: 800;

    letter-spacing: -2px;

    line-height: 1.05;

    margin-bottom: 10px;

}

.subtitle {

    font-size: 15px;

    line-height: 1.6;

    color: var(--muted);

    margin-bottom: 30px;

}

/* ===================================================== */
/* CALENDAR CONTAINER */
/* ===================================================== */

.calendar-box {

    position: relative;

    padding: 12px;

    border-radius: 32px;

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,0.7),
            rgba(255,255,255,0.4)
        );

    border:
        1px solid rgba(255,255,255,0.65);

}

.input {
    display: none;
}

/* ===================================================== */
/* INFO */
/* ===================================================== */

.info {

    margin-top: 26px;

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,0.82),
            rgba(255,255,255,0.58)
        );

    border-radius: 28px;

    padding: 10px 22px;

    border:
        1px solid rgba(255,255,255,0.7);

    backdrop-filter: blur(18px);

}

.row {

    display: flex;

    justify-content: space-between;

    align-items: center;

    padding: 18px 0;

}

.row:not(:last-child) {

    border-bottom:
        1px solid rgba(0,0,0,0.05);

}

.label {

    font-size: 14px;

    color: var(--muted);

    font-weight: 500;

}

.value {

    font-size: 16px;

    font-weight: 700;

}

/* ===================================================== */
/* BUTTON */
/* ===================================================== */

.button {

    width: 100%;

    border: none;

    border-radius: 24px;

    padding: 20px;

    margin-top: 28px;

    background:
        linear-gradient(
            135deg,
            #111111,
            #2a2a2a
        );

    color: white;

    font-size: 16px;

    font-weight: 700;

    cursor: pointer;

    transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.18s ease;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.18);

}

.button:hover {

    transform:
        translateY(-2px);

}

.button:active {

    transform:
        scale(0.985);

}

.button:disabled {

    opacity: 0.45;

    cursor: not-allowed;

    box-shadow: none;

}

/* ===================================================== */
/* STATUS */
/* ===================================================== */

.status {

    margin-top: 16px;

    text-align: center;

    font-size: 13px;

    color: var(--muted);

}

/* ===================================================== */
/* FLATPICKR */
/* ===================================================== */

.flatpickr-calendar {

    width: 100% !important;

    background: transparent !important;

    border: none !important;

    box-shadow: none !important;

}

.flatpickr-months {

    margin-bottom: 20px;

}

.flatpickr-current-month {

    font-size: 26px !important;

    font-weight: 800 !important;

    letter-spacing: -1px;

}

.flatpickr-weekdays {

    margin-bottom: 12px;

}

.flatpickr-weekday {

    color: #9aa0a6 !important;

    font-size: 12px !important;

    font-weight: 700 !important;

    text-transform: uppercase;

}

.dayContainer {

    width: 100% !important;

    min-width: 100% !important;

    max-width: 100% !important;

}

.flatpickr-day {

    border: none !important;

    border-radius: 20px !important;

    height: 58px !important;

    line-height: 58px !important;

    max-width: 58px !important;

    font-size: 15px;

    font-weight: 600;

    transition:
        all 0.16s ease;

}

.flatpickr-day:hover {

    background:
        rgba(17,17,17,0.06) !important;

    transform:
        scale(1.06);

}

/* TODAY */

.flatpickr-day.today {

    border:
        1.5px solid #111 !important;

    background: white !important;

}

/* SELECTED */

.flatpickr-day.selected,
.flatpickr-day.startRange,
.flatpickr-day.endRange {

    background:
        linear-gradient(
            135deg,
            #111,
            #2a2a2a
        ) !important;

    color: white !important;

    box-shadow:
        0 8px 22px rgba(0,0,0,0.18);

}

/* RANGE */

.flatpickr-day.inRange {

    background:
        rgba(17,17,17,0.08) !important;

    color: #111 !important;

    border-radius: 0 !important;

}

.flatpickr-day.startRange {

    border-top-left-radius: 20px !important;
    border-bottom-left-radius: 20px !important;

}

.flatpickr-day.endRange {

    border-top-right-radius: 20px !important;
    border-bottom-right-radius: 20px !important;

}

/* DISABLED */

.flatpickr-day.flatpickr-disabled {

    background:
        rgba(255,80,80,0.08) !important;

    color: #ff4d4f !important;

    opacity: 0.8;

    text-decoration: line-through;

}

/* OTHER MONTH */

.flatpickr-day.prevMonthDay,
.flatpickr-day.nextMonthDay {

    opacity: 0.18;

}

/* NAVIGATION */

.flatpickr-prev-month,
.flatpickr-next-month {

    top: 8px !important;

    padding: 8px !important;

}

.flatpickr-prev-month:hover,
.flatpickr-next-month:hover {

    background:
        rgba(17,17,17,0.05);

    border-radius: 14px;

}

/* ===================================================== */
/* MOBILE */
/* ===================================================== */

@media (max-width: 640px) {

    .wrapper {

        padding:
            calc(env(safe-area-inset-top) + 8px)
            10px
            140px;

    }

    .card {

        border-radius: 28px;

        padding: 22px 18px;

    }

    .title {

        font-size: 32px;

    }

    .flatpickr-current-month {

        font-size: 22px !important;

    }

    .flatpickr-day {

        height: 50px !important;

        line-height: 50px !important;

        max-width: 50px !important;

        border-radius: 18px !important;

    }

}

</style>

</head>

<body>

<div class="wrapper">

<div class="card">

<div class="title">
🏠 Городская Пауза
</div>

<div class="subtitle">
Выберите даты проживания
</div>

<div class="calendar-box">

<input
type="text"
id="calendar"
class="input"
/>

</div>

<div class="info">

<div class="row">
<div class="label">Заезд</div>
<div class="value" id="checkin-value">—</div>
</div>

<div class="row">
<div class="label">Выезд</div>
<div class="value" id="checkout-value">—</div>
</div>

<div class="row">
<div class="label">Ночей</div>
<div class="value" id="nights-value">0</div>
</div>

</div>

<div class="status">
🔴 Красные даты заняты
</div>

</div>

</div>

<!-- STICKY FOOTER -->

<div class="sticky-booking">

    <div class="sticky-left">

        <div class="sticky-price">
            €120
            <span>/ night</span>
        </div>

        <div class="sticky-dates" id="sticky-dates">
            Выберите даты
        </div>

    </div>

    <button
        class="sticky-button"
        id="sticky-button"
        onclick="sendBooking()"
        disabled
    >
        Забронировать
    </button>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

let bookedDates = [];

let selectedCheckIn = null;
let selectedCheckOut = null;


// LOAD BOOKINGS

async function loadBookedDates() {

    try {

        const response = await fetch("/api/booked-dates");

        const ranges = await response.json();

        bookedDates = expandBookedRanges(ranges);

        initCalendar();

    } catch (e) {

        console.error(e);

    }

}


// EXPAND RANGES

function expandBookedRanges(ranges) {

    const disabled = [];

    ranges.forEach(range => {

        const start = new Date(range.check_in);
        const end = new Date(range.check_out);

        const current = new Date(start);

        while (current < end) {

            disabled.push(formatDate(current));

            current.setDate(current.getDate() + 1);

        }

    });

    return disabled;

}


// FORMAT DATE

function formatDate(date) {

    const y = date.getFullYear();

    const m = String(date.getMonth() + 1)
        .padStart(2, "0");

    const d = String(date.getDate())
        .padStart(2, "0");

    return `${y}-${m}-${d}`;

}


// CALCULATE NIGHTS

function calculateNights(start, end) {

    const s = new Date(start);
    const e = new Date(end);

    const diff = e - s;

    return Math.ceil(
        diff / (1000 * 60 * 60 * 24)
    );

}


// UPDATE INFO

function updateInfo() {

    document.getElementById("checkin-value")
        .innerText = selectedCheckIn || "—";

    document.getElementById("checkout-value")
        .innerText = selectedCheckOut || "—";

    const stickyDates =
        document.getElementById("sticky-dates");

    const stickyButton =
        document.getElementById("sticky-button");

    if (selectedCheckIn && selectedCheckOut) {

        const nights = calculateNights(
            selectedCheckIn,
            selectedCheckOut
        );

        document.getElementById("nights-value")
            .innerText = nights;

        stickyButton.disabled = false;

        stickyDates.innerText =
            `${selectedCheckIn} → ${selectedCheckOut}`;

    } else {

        document.getElementById("nights-value")
            .innerText = "0";

        stickyButton.disabled = true;

        stickyDates.innerText =
            "Выберите даты";

    }

}


// INIT CALENDAR

function initCalendar() {

    flatpickr("#calendar", {

        mode: "range",

        minDate: "today",

        dateFormat: "Y-m-d",

        locale: "ru",

        showMonths: 2,

        disable: bookedDates,

        inline: true,

        onChange: function(selectedDates) {

            if (selectedDates.length === 2) {

                selectedCheckIn =
                    formatDate(selectedDates[0]);

                selectedCheckOut =
                    formatDate(selectedDates[1]);

            } else {

                selectedCheckIn = null;
                selectedCheckOut = null;

            }

            updateInfo();

        }

    });

}


// SEND BOOKING

function sendBooking() {

    if (!selectedCheckIn || !selectedCheckOut) {

        alert("Выберите даты");

        return;

    }

    tg.sendData(JSON.stringify({

        check_in: selectedCheckIn,
        check_out: selectedCheckOut,
        guests: 2

    }));

}


// START

loadBookedDates();

</script>

</body>
</html>
